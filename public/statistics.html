<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallBoss - Statistics</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { background: var(--bg-primary, #0f1117); color: var(--text-primary, #e4e4e7); font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0; }
        :root { --bg-primary: #0f1117; --bg-secondary: #1a1b23; --bg-card: #21222d; --text-primary: #e4e4e7; --text-secondary: #a1a1aa; --accent-blue: #3b82f6; --accent-green: #22c55e; --accent-red: #ef4444; --accent-orange: #f59e0b; --border-color: #2d2e3a; --radius: 12px; }
        .stats-page { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .stats-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .stats-header h1 { font-size: 24px; font-weight: 700; margin: 0; }
        .stats-header .back-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .stats-header .back-btn:hover { background: var(--accent-blue); }
        .stats-controls { display: flex; gap: 12px; flex-wrap: wrap; }
        .stats-controls select { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 12px; border-radius: 8px; font-size: 14px; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .summary-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 20px; }
        .summary-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .summary-card .value { font-size: 28px; font-weight: 700; }
        .summary-card .value.green { color: var(--accent-green); }
        .summary-card .value.blue { color: var(--accent-blue); }
        .summary-card .value.orange { color: var(--accent-orange); }
        .chart-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
        .chart-container h3 { margin: 0 0 16px 0; font-size: 16px; }
        .chart-wrapper { position: relative; height: 300px; }
        .stats-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
        .stats-table th, .stats-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .stats-table th { background: var(--bg-secondary); color: var(--text-secondary); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table tr:hover td { background: rgba(59, 130, 246, 0.05); }
        .country-table { margin-bottom: 24px; }
        .country-table h3 { margin: 0 0 16px 0; font-size: 16px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .badge-green { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
        .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 60px; }
        .loading-spinner .spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="stats-page">
        <div class="stats-header">
            <div style="display:flex;align-items:center;gap:16px;">
                <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
                <h1><i class="fas fa-chart-bar" style="color:var(--accent-blue)"></i> Statistics</h1>
            </div>
            <div class="stats-controls">
                <select id="periodSelect">
                    <option value="7">Last 7 days</option>
                    <option value="14">Last 14 days</option>
                    <option value="30" selected>Last 30 days</option>
                    <option value="60">Last 60 days</option>
                    <option value="90">Last 90 days</option>
                </select>
            </div>
        </div>

        <div id="loadingArea" class="loading-spinner"><div class="spinner"></div></div>

        <div id="statsContent" style="display:none;">
            <div class="summary-cards">
                <div class="summary-card"><div class="label">Total Leads</div><div class="value blue" id="totalLeads">0</div></div>
                <div class="summary-card"><div class="label">Total Conversions</div><div class="value green" id="totalConversions">0</div></div>
                <div class="summary-card"><div class="label">Total Calls</div><div class="value" id="totalCalls">0</div></div>
                <div class="summary-card"><div class="label">Conversion Rate</div><div class="value orange" id="convRate">0%</div></div>
            </div>

            <div class="chart-container">
                <h3>Daily Leads & Conversions</h3>
                <div class="chart-wrapper"><canvas id="dailyChart"></canvas></div>
            </div>

            <div class="country-table">
                <h3>Performance by Country</h3>
                <table class="stats-table">
                    <thead><tr><th>Country</th><th>Leads</th><th>Conversions</th><th>Conv. Rate</th></tr></thead>
                    <tbody id="countryTableBody"></tbody>
                </table>
            </div>

            <div>
                <h3>Daily Breakdown</h3>
                <table class="stats-table">
                    <thead><tr><th>Date</th><th>Leads</th><th>Calls</th><th>Conversions</th><th>Conv. Rate</th></tr></thead>
                    <tbody id="dailyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Auth check
        const user = JSON.parse(localStorage.getItem('callcenter_user') || 'null');
        if (!user) { window.location.href = '/login'; }

        const isAdmin = user.role === 'admin' || user.username === 'noriks';
        const userCountries = user.countries || [];
        const countriesParam = isAdmin || userCountries.includes('all') ? 'all' : userCountries.join(',');

        let dailyChart = null;

        async function loadStats() {
            const days = document.getElementById('periodSelect').value;
            document.getElementById('loadingArea').style.display = 'flex';
            document.getElementById('statsContent').style.display = 'none';

            try {
                const resp = await fetch(`/api/statistics?days=${days}&countries=${countriesParam}`);
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || 'Failed');

                document.getElementById('totalLeads').textContent = data.totalLeads;
                document.getElementById('totalConversions').textContent = data.totalConversions;
                document.getElementById('totalCalls').textContent = data.totalCalls;
                const rate = data.totalLeads > 0 ? (data.totalConversions / data.totalLeads * 100).toFixed(1) : '0';
                document.getElementById('convRate').textContent = rate + '%';

                // Chart
                const labels = data.dailyStats.map(d => {
                    const dt = new Date(d.date);
                    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                });
                const leadsData = data.dailyStats.map(d => d.leads);
                const conversionsData = data.dailyStats.map(d => d.conversions);
                const callsData = data.dailyStats.map(d => d.calls);

                if (dailyChart) dailyChart.destroy();
                dailyChart = new Chart(document.getElementById('dailyChart'), {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [
                            { label: 'Leads', data: leadsData, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4 },
                            { label: 'Calls', data: callsData, backgroundColor: 'rgba(168,85,247,0.5)', borderRadius: 4 },
                            { label: 'Conversions', data: conversionsData, backgroundColor: 'rgba(34,197,94,0.7)', borderRadius: 4 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a1a1aa', maxRotation: 45 } },
                            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a1a1aa' }, beginAtZero: true }
                        },
                        plugins: { legend: { labels: { color: '#e4e4e7' } } }
                    }
                });

                // Country table
                const ctb = document.getElementById('countryTableBody');
                ctb.innerHTML = Object.entries(data.countryStats).map(([code, s]) =>
                    `<tr><td>${s.flag} ${s.name}</td><td>${s.leads}</td><td>${s.conversions}</td><td><span class="badge badge-green">${s.conversionRate}%</span></td></tr>`
                ).join('');

                // Daily table
                const dtb = document.getElementById('dailyTableBody');
                dtb.innerHTML = data.dailyStats.slice().reverse().map(d =>
                    `<tr><td>${d.date}</td><td>${d.leads}</td><td>${d.calls}</td><td>${d.conversions}</td><td><span class="badge badge-green">${d.conversionRate}%</span></td></tr>`
                ).join('');

                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('statsContent').style.display = 'block';
            } catch (e) {
                document.getElementById('loadingArea').innerHTML = '<p style="color:var(--accent-red)">Error: ' + e.message + '</p>';
            }
        }

        document.getElementById('periodSelect').addEventListener('change', loadStats);
        loadStats();
    </script>
</body>
</html>
